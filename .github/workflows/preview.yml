name: Build and Deploy

on:
  pull_request:
    branches:
      - "*-release/**"

jobs:

  build-and-maybe-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Show deployment context
        run: |
          echo "Environment: ${{ needs.prepare.outputs.environment_name }}"
          echo "AWS_REGION set: ${{ vars.AWS_REGION != '' }}"
          echo "AWS_ACCESS_KEY_ID set: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}"
          echo "AWS_SECRET_ACCESS_KEY set: ${{ secrets.AWS_SECRET_ACCESS_KEY != '' }}"

      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build:tokens

      - name: Build
        run: npm run build

      - name: Deploy to S3-compatible CDN target
        shell: bash
        env:
          DEPLOY_PATH_SUFFIX: pr/${{ github.event.pull_request.number }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
        run: |
          if [ -z "${S3_BUCKET}" ]; then
            echo "S3_BUCKET is required."
            exit 1
          fi

          if [ -z "${S3_ENDPOINT}" ]; then
            echo "S3_ENDPOINT is required."
            exit 1
          fi

          TARGET_PATH="s3://${S3_BUCKET}/${DEPLOY_PATH_SUFFIX}"

          echo "Deploying to ${TARGET_PATH}"

          aws s3 sync ./dist "${TARGET_PATH}" \
            --endpoint-url "${S3_ENDPOINT}" \
            --delete
