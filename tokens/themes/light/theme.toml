[color.active]
"$value" = "black"


# With btn-text, it works but paragon complains about collision with btn.text.
# But if I use btn.text, it does not override --pgn-color-btn-text-brand...
[color.btn-text.brand]
"$value" = "black"
[color.btn.hover-text.brand]
"$value" = "black"

[color.btn-text.primary]
"$value" = "black"
[color.btn.hover-text.primary]
"$value" = "black"

[color.primary.base]
"$value" = "#FFC627"
actions = { default = "{color.action.default.primary.base}" }

[color.primary.100]
"$value" = "{color.primary.base}"
actions = { default = "{color.action.default.primary.100}" }
